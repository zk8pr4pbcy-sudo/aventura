<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aventura Gallery | Places, Events &amp; Details</title>
  <meta name="description" content="A visual preview of Red Sea, Historic Jeddah, desert, Taif, events and guest collection concepts by AVENTURA.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#04111d">
  <link rel="canonical" href="https://aventuraksa.com/gallery.html">
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Aventura Gallery">
  <meta property="og:image" content="https://aventuraksa.com/assets/images/og-cover.jpg">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/translations.js" defer></script>
  <script src="assets/js/app.js" defer></script>
</head>
<body data-page="gallery" data-title-key="gallery.metaTitle" data-description-key="gallery.metaDescription">
  <site-header></site-header>
  <main id="main">
    <section class="page-hero">
      <img class="page-hero-media" src="assets/images/hero-jeddah.webp" width="1600" height="900" alt="" fetchpriority="high">
      <div class="container">
        <div class="page-hero-content" data-reveal>
          <span class="eyebrow" data-i18n="gallery.heroEyebrow">Visual journal</span>
          <h1 data-i18n="gallery.heroTitle">Places, settings and thoughtful details.</h1>
          <p class="page-hero-description" data-i18n="gallery.heroDescription">A visual direction for the experiences and events we shape. Final arrangements vary with each program.</p>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container gallery-grid">
        <figure class="gallery-item wide" data-reveal><img src="assets/images/experience-sea.webp" width="1200" height="675" loading="lazy" alt=""><span data-i18n="gallery.sea">Red Sea journeys</span></figure>
        <figure class="gallery-item" data-reveal><img src="assets/images/experience-historic.webp" width="1200" height="675" loading="lazy" alt=""><span data-i18n="gallery.historic">Historic Jeddah</span></figure>
        <figure class="gallery-item" data-reveal><img src="assets/images/experience-desert.webp" width="1200" height="675" loading="lazy" alt=""><span data-i18n="gallery.desert">Desert at last light</span></figure>
        <figure class="gallery-item wide" data-reveal><img src="assets/images/experience-taif.webp" width="1200" height="675" loading="lazy" alt=""><span data-i18n="gallery.taif">Taif highlands</span></figure>
        <figure class="gallery-item wide" data-reveal><img src="assets/images/event-corporate.webp" width="1200" height="675" loading="lazy" alt=""><span data-i18n="gallery.corporate">Executive events</span></figure>
        <figure class="gallery-item" data-reveal><img src="assets/images/event-private.webp" width="1200" height="675" loading="lazy" alt=""><span data-i18n="gallery.private">Private gatherings</span></figure>
        <figure class="gallery-item" data-reveal><img src="assets/images/collection.webp" width="1200" height="675" loading="lazy" alt=""><span data-i18n="gallery.collection">Experience collection</span></figure>
        <figure class="gallery-item wide" data-reveal><img src="assets/images/hero-jeddah.webp" width="1600" height="900" loading="lazy" alt=""><span data-i18n="gallery.jeddah">Jeddah after sunset</span></figure>
      </div>
      <div class="narrow section-sm" data-reveal>
        <p class="lead" data-i18n="gallery.disclaimer">These images present the visual direction of Aventura. Venues, products and setups are confirmed separately for each request.</p>
      </div>
    </section>
  </main>
  <site-footer></site-footer>
</body>
</html>
